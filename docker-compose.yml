version: '3.9'
services:
  nexuschat:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./day10:/app/day10
      - ./day2:/app/day2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
