<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>NexusChat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;height:100vh;display:flex;flex-direction:column}
header{background:#0D2B55;color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
header h1{font-size:1.3rem;font-weight:700;letter-spacing:0.5px}
#status-dot{width:10px;height:10px;border-radius:50%;background:#4caf50;display:inline-block;margin-right:6px}
#status-text{font-size:0.8rem;color:#90caf9}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:#1a3a6b;display:flex;flex-direction:column;padding:16px;gap:12px;overflow-y:auto}
.sidebar h2{color:#90caf9;font-size:0.75rem;text-transform:uppercase;letter-spacing:1px}
#new-chat-btn{background:#1565C0;color:white;border:none;border-radius:8px;padding:10px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:background 0.2s}
#new-chat-btn:hover{background:#1976D2}
#session-info{background:rgba(255,255,255,0.07);border-radius:6px;padding:10px;color:#cfd8dc;font-size:0.78rem;word-break:break-all}
#chunks-badge{background:rgba(255,255,255,0.1);color:#b3e5fc;border-radius:6px;padding:8px 10px;font-size:0.8rem}
#doc-name{width:100%;padding:7px 10px;border-radius:6px;border:none;font-size:0.85rem}
#doc-content{width:100%;padding:7px 10px;border-radius:6px;border:none;font-size:0.85rem;resize:vertical}
#ingest-btn{width:100%;background:#1B5E20;color:white;border:none;border-radius:8px;padding:8px;font-size:0.85rem;font-weight:600;cursor:pointer}
#ingest-btn:hover{background:#2E7D32}
#ingest-status{font-size:0.78rem;color:#90caf9;margin-top:6px;min-height:18px}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
#messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.message{display:flex;flex-direction:column;max-width:75%}
.message.user{align-self:flex-end;align-items:flex-end}
.message.bot{align-self:flex-start;align-items:flex-start}
.bubble{padding:12px 16px;border-radius:18px;font-size:0.95rem;line-height:1.55;white-space:pre-wrap}
.message.user .bubble{background:#1565C0;color:white;border-bottom-right-radius:4px}
.message.bot .bubble{background:white;color:#212121;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.typing-indicator{display:flex;gap:5px;padding:14px 18px}
.typing-indicator span{width:8px;height:8px;background:#90a4ae;border-radius:50%;animation:bounce 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:0.2s}
.typing-indicator span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.sources{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
.source-tag{background:#e3f0fb;color:#1565C0;border:1px solid #90caf9;border-radius:12px;padding:3px 10px;font-size:0.75rem;font-weight:600;cursor:pointer}
.source-tag:hover{background:#bbdefb}
.source-preview{display:none;background:#f9f9f9;border:1px solid #90caf9;border-radius:8px;padding:10px 12px;font-size:0.8rem;color:#37474f;margin-top:4px;max-width:400px;line-height:1.5;white-space:pre-wrap}
.turn-label{font-size:0.72rem;color:#90a4ae;margin-bottom:3px}
.copy-btn{margin-top:6px;background:none;border:1px solid #cfd8dc;border-radius:6px;padding:3px 10px;font-size:0.75rem;cursor:pointer;color:#546E7A;align-self:flex-start}
.copy-btn:hover{background:#eceff1}
.input-bar{padding:16px 24px;background:white;border-top:1px solid #e0e0e0;display:flex;gap:10px;align-items:flex-end}
.input-wrapper{flex:1;display:flex;flex-direction:column;gap:4px}
#question-input{border:1.5px solid #cfd8dc;border-radius:12px;padding:10px 14px;font-size:0.95rem;resize:none;outline:none;max-height:120px;overflow-y:auto;transition:border-color 0.2s;width:100%}
#question-input:focus{border-color:#1565C0}
#char-count{font-size:0.72rem;color:#90a4ae;text-align:right}
#send-btn{background:#1565C0;color:white;border:none;border-radius:12px;padding:10px 20px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s;white-space:nowrap}
#send-btn:hover:not(:disabled){background:#1976D2}
#send-btn:disabled{background:#90a4ae;cursor:not-allowed}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<header>
<h1>NexusChat</h1>
<div>
<span id='status-dot'></span>
<span id='status-text'>Connecting...</span>
</div>
</header>
<div class='main'>
<aside class='sidebar'>
<button id='new-chat-btn'>+ New Chat</button>
<h2>Session</h2>
<div id='session-info'>No session yet</div>
<h2>Index</h2>
<div id='chunks-badge'>Loading index info...</div>
<h2>Add Document</h2>
<input id='doc-name' type='text' placeholder='filename.txt'>
<textarea id='doc-content' rows='5' placeholder='Paste document text here...'></textarea>
<button id='ingest-btn'>Upload Document</button>
<div id='ingest-status'></div>
</aside>
<div class='chat-area'>
<div id='messages'></div>
<div class='input-bar'>
<div class='input-wrapper'>
<textarea id='question-input' rows='1' placeholder='Ask a question about your documents...'></textarea>
<span id='char-count'>0 characters</span>
</div>
<button id='send-btn'>Send</button>
</div>
</div>
</div>
<script>
const API_BASE = '';
let sessionId = null;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('question-input');
const sendBtn = document.getElementById('send-btn');
const sessionInfo = document.getElementById('session-info');
const chunksBadge = document.getElementById('chunks-badge');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const charCount = document.getElementById('char-count');

function appendMessage(role, text, sources, turnNumber) {
const wrapper = document.createElement('div');
wrapper.className = 'message ' + role;

if (role === 'bot' && turnNumber) {
const turnLabel = document.createElement('div');
turnLabel.className = 'turn-label';
turnLabel.textContent = 'Turn ' + turnNumber;
wrapper.appendChild(turnLabel);
}

const bubble = document.createElement('div');
bubble.className = 'bubble';
bubble.textContent = text;
wrapper.appendChild(bubble);

if (role === 'bot' && text !== 'New conversation started. What would you like to know about your documents?' && !text.startsWith('Hello!')) {
const copyBtn = document.createElement('button');
copyBtn.className = 'copy-btn';
copyBtn.textContent = 'Copy';
copyBtn.addEventListener('click', function() {
navigator.clipboard.writeText(text).then(function() {
copyBtn.textContent = 'Copied!';
setTimeout(function() { copyBtn.textContent = 'Copy'; }, 2000);
});
});
wrapper.appendChild(copyBtn);
}

if (sources && sources.length > 0) {
const sourcesEl = document.createElement('div');
sourcesEl.className = 'sources';
const uniqueSources = [...new Set(sources.map(function(s) { return s.source; }))];
uniqueSources.forEach(function(src) {
const srcChunks = sources.filter(function(s) { return s.source === src; });
const tag = document.createElement('span');
tag.className = 'source-tag';
tag.textContent = src;
tag.title = 'Click to see retrieved excerpt';

const preview = document.createElement('div');
preview.className = 'source-preview';
preview.textContent = srcChunks[0] ? srcChunks[0].preview || '(no preview available)' : '(no preview available)';

tag.addEventListener('click', function() {
preview.style.display = preview.style.display === 'none' ? 'block' : 'none';
});

sourcesEl.appendChild(tag);
sourcesEl.appendChild(preview);
});
wrapper.appendChild(sourcesEl);
}

messagesEl.appendChild(wrapper);
messagesEl.scrollTop = messagesEl.scrollHeight;
return wrapper;
}

function showTyping() {
const wrapper = document.createElement('div');
wrapper.className = 'message bot';
wrapper.id = 'typing-indicator';
const bubble = document.createElement('div');
bubble.className = 'bubble typing-indicator';
bubble.innerHTML = '<span></span><span></span><span></span>';
wrapper.appendChild(bubble);
messagesEl.appendChild(wrapper);
messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
const el = document.getElementById('typing-indicator');
if (el) el.remove();
}

async function checkHealth() {
try {
const r = await fetch(API_BASE + '/health');
const data = await r.json();
statusDot.style.background = '#4caf50';
statusText.textContent = 'Connected';
chunksBadge.textContent = data.chunks_indexed + ' chunks indexed';
} catch (e) {
statusDot.style.background = '#f44336';
statusText.textContent = 'API offline';
chunksBadge.textContent = 'Cannot reach API';
}
}

async function sendQuestion() {
const question = inputEl.value.trim();
if (!question) return;

inputEl.value = '';
charCount.textContent = '0 characters';
inputEl.style.height = 'auto';
sendBtn.disabled = true;

appendMessage('user', question, null);

const botWrapper = document.createElement('div');
botWrapper.className = 'message bot';
const botBubble = document.createElement('div');
botBubble.className = 'bubble';
botBubble.textContent = '';
botWrapper.appendChild(botBubble);

const cursor = document.createElement('span');
cursor.textContent = '\u258B';
cursor.style.animation = 'blink 1s step-end infinite';
botBubble.appendChild(cursor);

messagesEl.appendChild(botWrapper);
messagesEl.scrollTop = messagesEl.scrollHeight;

try {
const body = { question: question };
if (sessionId) body.session_id = sessionId;

const response = await fetch(API_BASE + '/chat/stream', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(body)
});

if (!response.ok) {
const err = await response.json();
botBubble.textContent = 'Error: ' + (err.detail || 'Unknown error');
cursor.remove();
sendBtn.disabled = false;
inputEl.focus();
return;
}

const reader = response.body.getReader();
const decoder = new TextDecoder();
let buffer = '';

while (true) {
const { value, done } = await reader.read();
if (done) break;

buffer += decoder.decode(value, { stream: true });
const parts = buffer.split('\n\n');
buffer = parts.pop();

for (const part of parts) {
const line = part.trim();
if (!line.startsWith('data: ')) continue;
let event;
try {
event = JSON.parse(line.slice(6));
} catch (e) { continue; }

if (event.token) {
botBubble.insertBefore(document.createTextNode(event.token), cursor);
messagesEl.scrollTop = messagesEl.scrollHeight;
}

if (event.sources) {
const sourcesEl = document.createElement('div');
sourcesEl.className = 'sources';
const unique = [...new Set(event.sources.map(function(s) { return s.source; }))];
unique.forEach(function(src) {
const srcData = event.sources.find(function(s) { return s.source === src; });
const tag = document.createElement('span');
tag.className = 'source-tag';
tag.textContent = src;
tag.style.cursor = 'pointer';
const preview = document.createElement('div');
preview.className = 'source-preview';
preview.textContent = srcData ? srcData.preview || '' : '';
tag.addEventListener('click', function() {
preview.style.display = preview.style.display === 'none' ? 'block' : 'none';
});
sourcesEl.appendChild(tag);
sourcesEl.appendChild(preview);
});
botWrapper.appendChild(sourcesEl);
}

if (event.done) {
cursor.remove();
if (!sessionId && event.session_id) {
sessionId = event.session_id;
sessionInfo.textContent = sessionId;
}
const copyBtn = document.createElement('button');
copyBtn.className = 'copy-btn';
copyBtn.textContent = 'Copy';
copyBtn.addEventListener('click', function() {
navigator.clipboard.writeText(botBubble.textContent).then(function() {
copyBtn.textContent = 'Copied!';
setTimeout(function() { copyBtn.textContent = 'Copy'; }, 2000);
});
});
botWrapper.appendChild(copyBtn);
}

if (event.error) {
botBubble.textContent = 'Error: ' + event.error;
cursor.remove();
}
}
}

cursor.remove();
} catch (e) {
botBubble.textContent = 'Stream failed — is the server running?';
cursor.remove();
} finally {
sendBtn.disabled = false;
inputEl.focus();
}
}

document.getElementById('new-chat-btn').addEventListener('click', function() {
sessionId = null;
messagesEl.innerHTML = '';
sessionInfo.textContent = 'No session yet';
appendMessage('bot', 'New conversation started. What would you like to know about your documents?', null);
inputEl.focus();
});

document.getElementById('ingest-btn').addEventListener('click', async function() {
const filename = document.getElementById('doc-name').value.trim();
const content = document.getElementById('doc-content').value.trim();
const statusEl = document.getElementById('ingest-status');

if (!filename || !content) {
statusEl.textContent = 'Please provide both a filename and content.';
statusEl.style.color = '#ef9a9a';
return;
}

statusEl.textContent = 'Uploading...';
statusEl.style.color = '#90caf9';

try {
const r = await fetch(API_BASE + '/ingest', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ filename: filename, content: content })
});
const data = await r.json();

if (r.ok) {
statusEl.textContent = 'Added ' + data.chunks_added + ' chunks. Total: ' + data.total_chunks + '.';
statusEl.style.color = '#a5d6a7';
chunksBadge.textContent = data.total_chunks + ' chunks indexed';
document.getElementById('doc-name').value = '';
document.getElementById('doc-content').value = '';
} else {
statusEl.textContent = 'Error: ' + data.detail;
statusEl.style.color = '#ef9a9a';
}
} catch (e) {
statusEl.textContent = 'Upload failed — is the server running?';
statusEl.style.color = '#ef9a9a';
}
});

sendBtn.addEventListener('click', sendQuestion);

inputEl.addEventListener('keydown', function(e) {
if (e.key === 'Enter' && !e.shiftKey) {
e.preventDefault();
sendQuestion();
}
});

inputEl.addEventListener('input', function() {
inputEl.style.height = 'auto';
inputEl.style.height = inputEl.scrollHeight + 'px';
charCount.textContent = inputEl.value.length + ' characters';
});

checkHealth();
appendMessage('bot', 'Hello! I am NexusChat. Ask me anything about the documents in the index.', null);
inputEl.focus();
</script>
</body>
</html>
